<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veri*Factu — Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.3/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <section class="section">
        <div class="container">
            <p class="title">Dashboard</p>
            <p class="subtitle">Resumen del sistema</p>

            <!-- Stat Cards -->
            <div class="columns is-multiline">
                <div class="column is-4">
                    <div class="box stat-card has-text-centered">
                        <div class="icon-large has-text-link"><i class="fas fa-building"></i></div>
                        <div class="stat-value" id="stat-companies">—</div>
                        <div class="stat-label">Empresas registradas</div>
                    </div>
                </div>
                <div class="column is-4">
                    <div class="box stat-card has-text-centered">
                        <div class="icon-large has-text-warning"><i class="fas fa-clock"></i></div>
                        <div class="stat-value" id="stat-pending">—</div>
                        <div class="stat-label">Facturas pendientes de envío</div>
                    </div>
                </div>
                <div class="column is-4">
                    <div class="box stat-card has-text-centered">
                        <div class="icon-large has-text-success"><i class="fas fa-circle-check"></i></div>
                        <div class="stat-value" id="stat-sent-today">—</div>
                        <div class="stat-label">Facturas enviadas hoy</div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <p class="title is-5 mt-5">Acciones rápidas</p>
            <div class="buttons mt-2">
                <a href="/frontend/companies.html" class="button is-primary">
                    <span class="icon"><i class="fas fa-plus"></i></span>
                    <span>Nueva empresa</span>
                </a>
                <a href="#" class="button is-info" id="btn-new-invoice">
                    <span class="icon"><i class="fas fa-file-circle-plus"></i></span>
                    <span>Nueva factura</span>
                </a>
                <a href="/frontend/process.html" class="button is-success">
                    <span class="icon"><i class="fas fa-paper-plane"></i></span>
                    <span>Enviar facturas</span>
                </a>
            </div>

            <!-- Recent Activity -->
            <div class="box mt-5">
                <p class="title is-5">Últimos movimientos</p>
                <div id="recent-activity"></div>
            </div>
        </div>
    </section>

    <script src="/frontend/app.js"></script>
    <script src="/frontend/index.js"></script>
</body>
</html>
